<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Mini Calculadora</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f2f2f2;
    }
    .calculadora {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    #display {
      width: 100%;
      height: 50px;
      font-size: 20px;
      margin-bottom: 10px;
      text-align: right;
      padding: 5px;
      border: none;
      border-radius: 5px;
    }
    .botoes {
      display: grid;
      grid-template-columns: repeat(4, 60px);
      gap: 10px;
    }
    button {
      height: 50px;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .operador { background: orange; color: white; }
    .igual { background: green; color: white; }
    .limpar { background: red; color: white; }
  </style>
</head>
<body>

<div class="calculadora">
  <input type="text" id="display" disabled>

  <div class="botoes">
    <button onclick="limpar()" class="limpar">C</button>
    <button onclick="apagar()">←</button>
    <button onclick="inserir('/')">/</button>
    <button onclick="inserir('*')">*</button>

    <button onclick="inserir('7')">7</button>
    <button onclick="inserir('8')">8</button>
    <button onclick="inserir('9')">9</button>
    <button onclick="inserir('-')">-</button>

    <button onclick="inserir('4')">4</button>
    <button onclick="inserir('5')">5</button>
    <button onclick="inserir('6')">6</button>
    <button onclick="inserir('+')">+</button>

    <button onclick="inserir('1')">1</button>
    <button onclick="inserir('2')">2</button>
    <button onclick="inserir('3')">3</button>
    <button onclick="calcular()" class="igual">=</button>

    <button onclick="inserir('0')" style="grid-column: span 2;">0</button>
    <button onclick="inserir('.')">.</button>
  </div>
</div>

<script>
  function inserir(valor) {
    document.getElementById("display").value += valor;
  }

  function limpar() {
    document.getElementById("display").value = "";
  }

  function apagar() {
    let display = document.getElementById("display");
    display.value = display.value.slice(0, -1);
  }

  function calcular() {
    let display = document.getElementById("display");
    try {
      display.value = eval(display.value);
    } catch {
      display.value = "Erro";
    }
  }
</script>

</body>
</html>
